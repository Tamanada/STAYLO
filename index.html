<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO: Primary Meta Tags -->
    <title>STAYLO Hotels — Hotelier-owned booking platform · 10% commission for life</title>
    <meta name="title" content="STAYLO Hotels — Hotelier-owned booking platform · 10% commission for life" />
    <meta name="description" content="STAYLO is the booking platform owned by hoteliers. Pay 10% commission instead of Booking.com's 22% — locked for life. Free to join. Launching in Koh Phangan." />
    <meta name="keywords" content="STAYLO Hotels, hotelier owned booking, fair hotel commission, Booking.com alternative, Agoda alternative, direct hotel booking, Koh Phangan hotels, Thailand hotel platform, 10 percent commission, hospitality cooperative" />
    <meta name="author" content="Staylo" />
    <link rel="canonical" href="https://staylo.app" />

    <!-- SEO: Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://staylo.app" />
    <meta property="og:title" content="STAYLO Hotels — 10% commission for life · Owned by hoteliers" />
    <meta property="og:description" content="The booking platform owned by hoteliers. Pay 10% instead of Booking.com's 22%. Locked for life. Free to join." />
    <meta property="og:image" content="https://staylo.app/og-image.png" />
    <meta property="og:site_name" content="Staylo" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="fr_FR" />
    <meta property="og:locale:alternate" content="th_TH" />
    <meta property="og:locale:alternate" content="es_ES" />
    <meta property="og:locale:alternate" content="ja_JP" />
    <meta property="og:locale:alternate" content="zh_CN" />
    <meta property="og:locale:alternate" content="de_DE" />
    <meta property="og:locale:alternate" content="pt_BR" />
    <meta property="og:locale:alternate" content="ru_RU" />
    <meta property="og:locale:alternate" content="ar_SA" />
    <meta property="og:locale:alternate" content="hi_IN" />
    <meta property="og:locale:alternate" content="id_ID" />
    <meta property="og:locale:alternate" content="it_IT" />
    <meta property="og:locale:alternate" content="my_MM" />

    <!-- SEO: Twitter/X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://staylo.app" />
    <meta name="twitter:title" content="STAYLO Hotels — 10% commission for life · Owned by hoteliers" />
    <meta name="twitter:description" content="The booking platform owned by hoteliers. Pay 10% instead of Booking.com's 22%. Locked for life. Free to join." />
    <meta name="twitter:image" content="https://staylo.app/og-image.png" />

    <!-- SEO: Structured Data (JSON-LD) -->
    <!-- 1. Organisation entity — the canonical "what is STAYLO" record.
            alternateName covers every variant Google might see ("Staylo",
            "STAYLO Hotels", "staylo.app") so they all roll up to the same brand.
            sameAs links anchor the entity to verified social profiles —
            these need to actually exist for Google to upgrade the entity. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "STAYLO Hotels",
      "alternateName": ["Staylo", "STAYLO", "staylo.app", "STAYLO Bookings"],
      "url": "https://staylo.app",
      "logo": "https://staylo.app/favicon.svg",
      "image": "https://staylo.app/og-image.png",
      "description": "STAYLO is the hotelier-owned hotel booking platform. Members pay only 10% commission instead of Booking.com's 22% — locked for life. Launched in Koh Phangan, Thailand.",
      "foundingDate": "2026",
      "slogan": "Hotelier-owned booking platform — 10% commission for life",
      "areaServed": {
        "@type": "Country",
        "name": "Thailand"
      },
      "sameAs": [
        "https://twitter.com/stayloapp",
        "https://www.instagram.com/staylo.app",
        "https://www.facebook.com/stayloapp",
        "https://www.linkedin.com/company/staylo",
        "https://github.com/Tamanada/STAYLO"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "email": "hello@staylo.app",
        "availableLanguage": ["English", "French", "Thai"]
      }
    }
    </script>

    <!-- 2. WebSite entity — enables Google sitelinks search box on the SERP. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "STAYLO Hotels",
      "alternateName": "Staylo",
      "url": "https://staylo.app",
      "inLanguage": ["en", "fr", "th", "es", "de", "it", "pt", "ja", "zh", "ar", "hi", "id", "ru", "my"],
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://staylo.app/dashboard/preview?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- 3. Service entity — what STAYLO actually offers, with explicit pricing.
            Helps Google understand the "10% commission" claim and may surface
            it in rich-result snippets. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Service",
      "name": "STAYLO Hotelier Membership",
      "provider": { "@type": "Organization", "name": "STAYLO Hotels" },
      "serviceType": "Hotel booking platform membership",
      "description": "Lifetime 10% commission rate for hoteliers, instead of the 18-25% charged by traditional OTAs. Free to join, no exclusivity, no cancellation fees.",
      "areaServed": "Thailand",
      "offers": {
        "@type": "Offer",
        "name": "Founding member commission rate",
        "description": "10% commission on every booking — locked for life",
        "price": "0",
        "priceCurrency": "USD",
        "availability": "https://schema.org/InStock",
        "url": "https://staylo.app/submit"
      }
    }
    </script>

    <!-- 4. FAQPage — the questions Google hears from users searching for
            "alternative to Booking.com" / "hotel commission". When Google
            picks this up, FAQ items can show as expandable rich results
            directly in SERP — taking ~2x the visual real estate. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is STAYLO?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "STAYLO is a hotel booking platform owned cooperatively by the hoteliers themselves. We charge 10% commission instead of the 18-25% charged by Booking.com, Agoda, and Expedia. The 10% rate is locked for life for founding members."
          }
        },
        {
          "@type": "Question",
          "name": "How is STAYLO different from Booking.com?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "STAYLO is owned by the hoteliers themselves — they are shareholders, not just suppliers. Three concrete differences: (1) commission is 10% vs 22% on Booking.com, (2) hoteliers vote on platform policy, (3) optional Bitcoin payouts with no FX or bank delays."
          }
        },
        {
          "@type": "Question",
          "name": "Is there any fee to join STAYLO as a hotelier?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Joining STAYLO is free. No subscription, no setup fee, no cancellation fee. You only pay the 10% commission on actual bookings made through the platform. You keep all your existing booking channels."
          }
        },
        {
          "@type": "Question",
          "name": "Where is STAYLO available?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "STAYLO is launching in Thailand, starting with Koh Phangan in 2026. We are actively onboarding hoteliers across Surat Thani, Phuket, Krabi, Chiang Mai, and Bangkok. Other countries will follow once we reach 500 hotels in Thailand."
          }
        },
        {
          "@type": "Question",
          "name": "Can hoteliers be paid in Bitcoin on STAYLO?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. STAYLO offers optional Bitcoin payouts via the Lightning Network — instant settlement, no FX fees, no bank delays. Hoteliers can choose between standard fiat payouts or BTC, or split between the two."
          }
        }
      ]
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <!-- SPA redirect handler -->
    <script>
      (function(){
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
