<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO: Primary Meta Tags -->
    <title>Staylo — Owned by Hoteliers, Built for Hospitality</title>
    <meta name="title" content="Staylo — Owned by Hoteliers, Built for Hospitality" />
    <meta name="description" content="The booking platform owned by hoteliers. Fair 10% commission vs 25% on Booking.com. Full control, real ownership. Join 127+ founding partners." />
    <meta name="keywords" content="hotel booking, direct booking, hotel platform, fair commission, hotelier owned, Staylo, Koh Phangan, alternative Booking.com, hospitality platform" />
    <meta name="author" content="Staylo" />
    <link rel="canonical" href="https://staylo.app" />

    <!-- SEO: Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://staylo.app" />
    <meta property="og:title" content="Staylo — Owned by Hoteliers, Built for Hospitality" />
    <meta property="og:description" content="The fair alternative to Booking.com. 10% commission, collective ownership. Join the revolution." />
    <meta property="og:image" content="https://staylo.app/og-image.png" />
    <meta property="og:site_name" content="Staylo" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="fr_FR" />
    <meta property="og:locale:alternate" content="th_TH" />
    <meta property="og:locale:alternate" content="es_ES" />
    <meta property="og:locale:alternate" content="ja_JP" />
    <meta property="og:locale:alternate" content="zh_CN" />
    <meta property="og:locale:alternate" content="de_DE" />
    <meta property="og:locale:alternate" content="pt_BR" />
    <meta property="og:locale:alternate" content="ru_RU" />
    <meta property="og:locale:alternate" content="ar_SA" />
    <meta property="og:locale:alternate" content="hi_IN" />
    <meta property="og:locale:alternate" content="id_ID" />
    <meta property="og:locale:alternate" content="it_IT" />
    <meta property="og:locale:alternate" content="my_MM" />

    <!-- SEO: Twitter/X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://staylo.app" />
    <meta name="twitter:title" content="Staylo — Owned by Hoteliers, Built for Hospitality" />
    <meta name="twitter:description" content="The fair alternative to Booking.com. 10% commission, collective ownership." />
    <meta name="twitter:image" content="https://staylo.app/og-image.png" />

    <!-- SEO: Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Staylo",
      "url": "https://staylo.app",
      "logo": "https://staylo.app/favicon.svg",
      "description": "The booking platform owned by hoteliers. Fair commissions, full control, real ownership.",
      "sameAs": [],
      "foundingDate": "2026",
      "slogan": "Owned by Hoteliers, Built for Hospitality"
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Staylo",
      "url": "https://staylo.app",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://staylo.app/dashboard/preview?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <!-- SPA redirect handler -->
    <script>
      (function(){
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
