<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 720" width="1920" height="720" preserveAspectRatio="xMidYMid slice">
  <!--
    STAYLO · FOOTER BANNER
    "From one island to the world."
    Wide-format banner showing Koh Phangan shining at the centre of a
    sparkling worldwide network.

    Composition (left → right):
      · brand-gradient background (orange → pink → purple)
      · STAYLO wordmark + tagline + tropical sunset scene (left half)
      · stylised globe with continent silhouettes (right half)
      · Koh Phangan bright shine with 7 sparkling links worldwide
      · endpoint stars at every destination

    Standalone .svg — embeds anywhere, scales clean, no external dep.
  -->

  <defs>
    <!-- Main brand gradient -->
    <linearGradient id="bg-main" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#FF6B00"/>
      <stop offset="40%" stop-color="#FF1F70"/>
      <stop offset="100%" stop-color="#6B21A8"/>
    </linearGradient>

    <!-- Subtle vignette on the right where the globe sits -->
    <radialGradient id="globe-vignette" cx="72%" cy="50%" r="38%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.05)" stop-opacity="1"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)" stop-opacity="0"/>
    </radialGradient>

    <!-- KP shine: bright white core → warm yellow → transparent -->
    <radialGradient id="kp-shine" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="25%" stop-color="#FFD580" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FF1F70" stop-opacity="0"/>
    </radialGradient>

    <!-- Sunset (bottom-left tropical scene) -->
    <radialGradient id="sunset-glow" cx="50%" cy="65%" r="50%">
      <stop offset="0%"  stop-color="#FFE680" stop-opacity="1"/>
      <stop offset="55%" stop-color="#FF6B00" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FF6B00" stop-opacity="0"/>
    </radialGradient>

    <!-- Spark line gradient -->
    <linearGradient id="link" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FFD580" stop-opacity="0.55"/>
    </linearGradient>

    <!-- Logo "O" gradient ring (matches the brand "O" device) -->
    <linearGradient id="lo-ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#FF6B00"/>
      <stop offset="100%" stop-color="#FF1F70"/>
    </linearGradient>
  </defs>

  <!-- ============================================================
       BACKGROUND
       ============================================================ -->
  <rect width="1920" height="720" fill="url(#bg-main)"/>
  <rect width="1920" height="720" fill="url(#globe-vignette)"/>

  <!-- ============================================================
       LEFT HALF — STAYLO logo + tagline + tropical scene
       ============================================================ -->

  <!-- TROPICAL SCENE silhouette (bottom-left, behind text) -->
  <g opacity="0.95">
    <!-- Sunset disc -->
    <circle cx="240" cy="560" r="180" fill="url(#sunset-glow)"/>
    <!-- Mountain silhouettes (back layer) -->
    <path d="M 0 600 L 90 510 L 160 560 L 230 480 L 310 530 L 380 500 L 460 580 L 540 540 L 620 600 L 720 580 L 720 720 L 0 720 Z"
          fill="#1A0533" opacity="0.55"/>
    <!-- Mountain silhouettes (front layer) -->
    <path d="M 0 660 L 70 620 L 140 650 L 210 600 L 290 640 L 380 615 L 470 660 L 540 620 L 620 660 L 720 640 L 720 720 L 0 720 Z"
          fill="#0F0218" opacity="0.7"/>
    <!-- Ocean reflection -->
    <path d="M 0 680 L 720 680 L 720 720 L 0 720 Z" fill="#2A0840" opacity="0.4"/>
    <line x1="100" y1="690" x2="240" y2="690" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="320" y1="695" x2="460" y2="695" stroke="rgba(255,255,255,0.2)"  stroke-width="1.2" stroke-linecap="round"/>
    <line x1="520" y1="700" x2="640" y2="700" stroke="rgba(255,255,255,0.18)" stroke-width="1"   stroke-linecap="round"/>

    <!-- Palm tree LEFT — silhouette -->
    <g transform="translate(80 720)">
      <path d="M 0 0 L -2 -190 L 2 -190 L 4 0 Z" fill="#0A0114"/>
      <!-- fronds -->
      <path d="M 0 -190 Q -40 -210 -70 -210 Q -30 -200 -2 -190 Z" fill="#0A0114"/>
      <path d="M 0 -190 Q -50 -220 -90 -225 Q -40 -210 -3 -192 Z" fill="#0A0114"/>
      <path d="M 0 -190 Q -30 -240 -50 -255 Q -10 -220 -1 -192 Z" fill="#0A0114"/>
      <path d="M 0 -190 Q 30 -230 50 -245 Q 10 -215 2 -192 Z" fill="#0A0114"/>
      <path d="M 0 -190 Q 50 -215 90 -218 Q 30 -205 3 -192 Z" fill="#0A0114"/>
      <path d="M 0 -190 Q 50 -180 80 -170 Q 25 -190 3 -192 Z" fill="#0A0114"/>
    </g>
    <!-- Palm tree mid -->
    <g transform="translate(180 720)">
      <path d="M 0 0 L -1.5 -160 L 1.5 -160 L 3 0 Z" fill="#0A0114"/>
      <path d="M 0 -160 Q -35 -180 -60 -180 Q -25 -170 -1 -162 Z" fill="#0A0114"/>
      <path d="M 0 -160 Q -40 -195 -65 -200 Q -25 -180 -2 -162 Z" fill="#0A0114"/>
      <path d="M 0 -160 Q -15 -205 -25 -220 Q -5 -180 0 -162 Z" fill="#0A0114"/>
      <path d="M 0 -160 Q 25 -205 40 -220 Q 10 -180 2 -162 Z" fill="#0A0114"/>
      <path d="M 0 -160 Q 40 -195 70 -200 Q 25 -180 3 -162 Z" fill="#0A0114"/>
      <path d="M 0 -160 Q 40 -165 65 -150 Q 20 -160 3 -162 Z" fill="#0A0114"/>
    </g>
    <!-- Small hut silhouette near palms -->
    <path d="M 130 720 L 130 695 L 145 678 L 160 695 L 160 720 Z" fill="#0A0114"/>
    <rect x="138" y="700" width="14" height="20" fill="#0A0114"/>
  </g>

  <!-- STAYLO LOGO (big, left half) -->
  <g transform="translate(110 240)">
    <!-- STAY wordmark in white -->
    <text font-family="Inter, sans-serif"
          font-weight="900"
          font-size="138"
          fill="#FFFFFF"
          letter-spacing="-3">STAY</text>
    <!-- O ring -->
    <g transform="translate(478 -88)">
      <circle cx="0" cy="0" r="58" fill="none" stroke="url(#lo-ring)" stroke-width="22"/>
    </g>
  </g>

  <!-- TAGLINE -->
  <g transform="translate(110 290)">
    <!-- Small gradient accent bar -->
    <rect x="0" y="20" width="80" height="6" rx="3" fill="url(#lo-ring)"/>
    <text x="0" y="80"
          font-family="Inter, sans-serif"
          font-weight="800"
          font-size="32"
          fill="#FFFFFF"
          letter-spacing="3.5">FROM ONE ISLAND</text>
    <text x="0" y="120"
          font-family="Inter, sans-serif"
          font-weight="800"
          font-size="32"
          fill="#FFFFFF"
          letter-spacing="3.5">TO THE WORLD.</text>
  </g>

  <!-- ============================================================
       RIGHT HALF — Stylised globe + KP shining + sparks
       Globe centred at (1420, 360), radius 320
       ============================================================ -->

  <!-- Outer sphere ring -->
  <circle cx="1420" cy="360" r="320" fill="none" stroke="rgba(255,255,255,0.65)" stroke-width="2"/>

  <!-- Meridians (vertical ellipses) -->
  <g stroke="rgba(255,255,255,0.32)" stroke-width="1.5" fill="none">
    <line x1="1420" y1="40" x2="1420" y2="680"/>
    <ellipse cx="1420" cy="360" rx="130" ry="320"/>
    <ellipse cx="1420" cy="360" rx="235" ry="320"/>
  </g>

  <!-- Parallels (horizontal ellipses) -->
  <g stroke="rgba(255,255,255,0.32)" stroke-width="1.5" fill="none">
    <line x1="1100" y1="360" x2="1740" y2="360"/>
    <ellipse cx="1420" cy="360" rx="320" ry="130"/>
    <ellipse cx="1420" cy="360" rx="320" ry="235"/>
  </g>

  <!-- ============================================================
       SIMPLIFIED CONTINENT OUTLINES on the globe
       Stylised silhouettes — recognisable at a glance, not survey
       ============================================================ -->
  <g stroke="rgba(255,255,255,0.78)" stroke-width="1.8" fill="rgba(255,255,255,0.05)" stroke-linejoin="round" stroke-linecap="round">

    <!-- NORTH AMERICA (top-left of globe) -->
    <path d="M 1190 220
             L 1180 200 L 1195 185 L 1220 180 L 1245 178 L 1270 188
             L 1285 205 L 1280 230 L 1265 245 L 1250 265 L 1238 290
             L 1225 305 L 1205 308 L 1195 290 L 1188 265 L 1185 240 Z"/>

    <!-- SOUTH AMERICA (lower-left of globe) -->
    <path d="M 1235 400
             L 1248 395 L 1258 410 L 1262 435 L 1258 465 L 1252 495
             L 1242 520 L 1230 535 L 1218 540 L 1212 525 L 1215 500
             L 1218 475 L 1222 450 L 1228 425 Z"/>

    <!-- EUROPE (upper-center, small cluster) -->
    <path d="M 1370 195
             L 1395 192 L 1418 196 L 1432 208 L 1430 222
             L 1418 232 L 1395 230 L 1380 218 L 1375 205 Z"/>

    <!-- AFRICA (center, distinctive shape) -->
    <path d="M 1395 270
             L 1418 265 L 1438 270 L 1450 285 L 1455 310
             L 1452 340 L 1445 370 L 1438 395 L 1428 415
             L 1418 432 L 1408 442 L 1398 438 L 1390 420
             L 1385 395 L 1382 365 L 1382 335 L 1385 305 Z"/>

    <!-- ASIA (large mass, right of center) -->
    <path d="M 1475 200
             L 1510 195 L 1545 200 L 1580 210 L 1610 225
             L 1635 245 L 1650 265 L 1655 290 L 1650 308
             L 1640 320 L 1620 322 L 1600 318 L 1580 312
             L 1560 305 L 1540 298 L 1520 290 L 1500 280
             L 1485 265 L 1475 248 L 1472 225 Z"/>

    <!-- AUSTRALIA (lower-right) -->
    <path d="M 1605 445
             L 1640 440 L 1665 445 L 1680 458 L 1678 475
             L 1665 488 L 1640 492 L 1618 488 L 1605 475 L 1600 460 Z"/>

    <!-- Indian subcontinent (subtle) -->
    <path d="M 1505 305
             L 1515 308 L 1518 325 L 1512 340 L 1505 345 L 1500 330 Z"/>

    <!-- Southeast Asia / Indonesia (where KP is) - subtle archipelago -->
    <path d="M 1555 360 L 1572 365 L 1580 370 L 1572 378 L 1555 372 Z"
          opacity="0.7"/>
  </g>

  <!-- ============================================================
       SPARKLING LINKS — KP origin to 7 worldwide destinations
       KP coordinate: (1568, 348) - approximately Thailand on globe
       ============================================================ -->
  <g stroke="url(#link)" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-dasharray="4 7" opacity="0.95">
    <!-- KP → North America (Mexico/USA area) -->
    <path d="M 1568 348 Q 1380 230, 1220 215"/>
    <!-- KP → Western Europe (Spain/France area) -->
    <path d="M 1568 348 Q 1480 250, 1395 215"/>
    <!-- KP → Central Europe (Germany/UK area) -->
    <path d="M 1568 348 Q 1510 270, 1410 195"/>
    <!-- KP → West Africa -->
    <path d="M 1568 348 Q 1500 360, 1405 395"/>
    <!-- KP → South Africa / Madagascar -->
    <path d="M 1568 348 Q 1500 450, 1430 510"/>
    <!-- KP → South America (Brazil) -->
    <path d="M 1568 348 Q 1430 460, 1255 495"/>
    <!-- KP → Australia -->
    <path d="M 1568 348 Q 1600 420, 1640 475"/>
  </g>

  <!-- ============================================================
       ENDPOINT STARS (sparkles at each destination)
       ============================================================ -->
  <g fill="#FFFFFF">
    <!-- North America -->
    <g transform="translate(1220 215)">
      <path d="M 0 -10 L 1.6 -1.6 L 10 0 L 1.6 1.6 L 0 10 L -1.6 1.6 L -10 0 L -1.6 -1.6 Z"/>
      <circle cx="0" cy="0" r="3" fill="#FFD580"/>
    </g>
    <!-- Western Europe -->
    <g transform="translate(1395 215)">
      <path d="M 0 -9 L 1.5 -1.5 L 9 0 L 1.5 1.5 L 0 9 L -1.5 1.5 L -9 0 L -1.5 -1.5 Z"/>
      <circle cx="0" cy="0" r="2.5" fill="#FFD580"/>
    </g>
    <!-- Central Europe -->
    <g transform="translate(1410 195)">
      <path d="M 0 -8 L 1.3 -1.3 L 8 0 L 1.3 1.3 L 0 8 L -1.3 1.3 L -8 0 L -1.3 -1.3 Z"/>
    </g>
    <!-- West Africa -->
    <g transform="translate(1405 395)">
      <path d="M 0 -9 L 1.5 -1.5 L 9 0 L 1.5 1.5 L 0 9 L -1.5 1.5 L -9 0 L -1.5 -1.5 Z"/>
      <circle cx="0" cy="0" r="2.5" fill="#FFD580"/>
    </g>
    <!-- South Africa -->
    <g transform="translate(1430 510)">
      <path d="M 0 -8 L 1.3 -1.3 L 8 0 L 1.3 1.3 L 0 8 L -1.3 1.3 L -8 0 L -1.3 -1.3 Z"/>
    </g>
    <!-- South America (Brazil) -->
    <g transform="translate(1255 495)">
      <path d="M 0 -10 L 1.6 -1.6 L 10 0 L 1.6 1.6 L 0 10 L -1.6 1.6 L -10 0 L -1.6 -1.6 Z"/>
      <circle cx="0" cy="0" r="3" fill="#FFD580"/>
    </g>
    <!-- Australia -->
    <g transform="translate(1640 475)">
      <path d="M 0 -9 L 1.5 -1.5 L 9 0 L 1.5 1.5 L 0 9 L -1.5 1.5 L -9 0 L -1.5 -1.5 Z"/>
      <circle cx="0" cy="0" r="2.5" fill="#FFD580"/>
    </g>
  </g>

  <!-- ============================================================
       KOH PHANGAN — shining bright at Thailand position
       ============================================================ -->
  <g transform="translate(1568 348)">
    <!-- Outer halo -->
    <circle cx="0" cy="0" r="65" fill="url(#kp-shine)"/>
    <!-- Inner glow -->
    <circle cx="0" cy="0" r="22" fill="#FFD580" opacity="0.65"/>
    <!-- Central white core -->
    <circle cx="0" cy="0" r="7" fill="#FFFFFF"/>
    <!-- Sparkle 4-point star -->
    <path d="M 0 -18 L 2 -2 L 18 0 L 2 2 L 0 18 L -2 2 L -18 0 L -2 -2 Z" fill="#FFFFFF" opacity="0.9"/>
  </g>

  <!-- KOH PHANGAN label -->
  <g transform="translate(1655 360)">
    <text x="0" y="0"
          font-family="Inter, sans-serif"
          font-weight="900"
          font-size="22"
          fill="#FFFFFF"
          letter-spacing="2">KOH</text>
    <text x="0" y="28"
          font-family="Inter, sans-serif"
          font-weight="900"
          font-size="22"
          fill="#FFFFFF"
          letter-spacing="2">PHANGAN</text>
  </g>

  <!-- contact line bottom-right (subtle) -->
  <text x="1860" y="700"
        font-family="Inter, sans-serif"
        font-weight="600"
        font-size="14"
        fill="rgba(255,255,255,0.7)"
        text-anchor="end"
        letter-spacing="2">staylo.app · contact@staylo.app</text>
</svg>
