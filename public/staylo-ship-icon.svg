<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="STAYLO Ship — Staylo Hotelier Integrated Platform">
  <!-- Same brand tile as the main STAYLO icon so they read as a family -->
  <defs>
    <linearGradient id="ship-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FF6B00"/>
      <stop offset="40%"  stop-color="#FF1F70"/>
      <stop offset="100%" stop-color="#7E22CE"/>
    </linearGradient>
  </defs>

  <!-- Rounded-square brand tile -->
  <rect x="16" y="16" width="480" height="480" rx="108" ry="108" fill="url(#ship-bg)"/>

  <!-- Sailboat — billowing single-sail interpretation. Instead of a
       flat triangle, the sail curves outward as if filled with wind,
       which reads more sculptural and luxe than the geometric versions
       we tried earlier. -->

  <!-- Mast — thin vertical, leaning slightly so the boat feels in motion -->
  <line x1="216" y1="98" x2="232" y2="352"
        stroke="#FFFFFF" stroke-width="6" stroke-linecap="round"/>

  <!-- Main sail — cubic-bezier curve that bulges out to the right,
       suggesting wind catching the canvas -->
  <path d="M 218 100
           C 380 130, 396 268, 366 352
           L 232 352 Z"
        fill="#FFFFFF"/>

  <!-- Tiny gold pennant at the masthead -->
  <path d="M 220 96 L 252 104 L 220 112 Z" fill="#FFE54C"/>

  <!-- Hull — sleek elongated curve, slim profile -->
  <path d="M 88 362 L 424 362 Q 408 418 332 422 L 180 422 Q 104 418 88 362 Z"
        fill="#FFFFFF"/>

  <!-- One stylized wave under the hull -->
  <path d="M 60 458 Q 160 438 256 458 T 452 458"
        stroke="#FFFFFF" stroke-width="9" stroke-linecap="round" fill="none"/>
</svg>
