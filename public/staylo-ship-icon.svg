<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="STAYLO Ship — Staylo Hotelier Integrated Platform">
  <!-- Same brand tile as the main STAYLO icon so they read as a family -->
  <defs>
    <linearGradient id="ship-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FF6B00"/>
      <stop offset="40%"  stop-color="#FF1F70"/>
      <stop offset="100%" stop-color="#7E22CE"/>
    </linearGradient>
  </defs>

  <!-- Rounded-square brand tile -->
  <rect x="16" y="16" width="480" height="480" rx="108" ry="108" fill="url(#ship-bg)"/>

  <!-- Origami paper boat — folded-paper aesthetic, very modern and
       app-icon friendly. Two shapes (peak + hull) with a gap that
       reveals the brand gradient as the fold line, plus one wave. -->

  <!-- Top peak / sail (triangle pointing up) -->
  <path d="M 256 122 L 380 282 L 132 282 Z" fill="#FFFFFF"/>

  <!-- Hull (trapezoid — wider at top, narrower at bottom, like a boat
       sitting on the water) -->
  <path d="M 100 296 L 412 296 L 352 408 L 160 408 Z" fill="#FFFFFF"/>

  <!-- One stylized wave under the hull -->
  <path d="M 70 452 Q 160 432 256 452 T 442 452"
        stroke="#FFFFFF" stroke-width="10" stroke-linecap="round" fill="none"/>
</svg>
