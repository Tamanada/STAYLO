<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="STAYLO Ship — Staylo Hotelier Integrated Platform">
  <!-- Same brand tile as the main STAYLO icon so they read as a family -->
  <defs>
    <linearGradient id="ship-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FF6B00"/>
      <stop offset="40%"  stop-color="#FF1F70"/>
      <stop offset="100%" stop-color="#7E22CE"/>
    </linearGradient>
  </defs>

  <!-- Rounded-square brand tile -->
  <rect x="16" y="16" width="480" height="480" rx="108" ry="108" fill="url(#ship-bg)"/>

  <!-- Compass rose — set your course as a hotelier.
       Outer bezel + 4 cardinal star points + 4 smaller intercardinal
       points + center hub with brand-gradient dot. -->

  <!-- Outer bezel ring -->
  <circle cx="256" cy="256" r="170" stroke="#FFFFFF" stroke-width="14" fill="none"/>

  <!-- Intercardinal points (NE / SE / SW / NW) — smaller, slightly faded
       so the cardinal star reads as the dominant element -->
  <g fill="#FFFFFF" opacity="0.55">
    <g transform="rotate(45 256 256)"><polygon points="256,140 276,256 236,256"/></g>
    <g transform="rotate(135 256 256)"><polygon points="256,140 276,256 236,256"/></g>
    <g transform="rotate(225 256 256)"><polygon points="256,140 276,256 236,256"/></g>
    <g transform="rotate(315 256 256)"><polygon points="256,140 276,256 236,256"/></g>
  </g>

  <!-- Cardinal points (N / E / S / W) — the main 4-point star -->
  <g fill="#FFFFFF">
    <polygon points="256,80 284,256 228,256"/>
    <g transform="rotate(90 256 256)"><polygon points="256,80 284,256 228,256"/></g>
    <g transform="rotate(180 256 256)"><polygon points="256,80 284,256 228,256"/></g>
    <g transform="rotate(270 256 256)"><polygon points="256,80 284,256 228,256"/></g>
  </g>

  <!-- Center hub — solid white with brand-gradient dot for depth -->
  <circle cx="256" cy="256" r="22" fill="#FFFFFF"/>
  <circle cx="256" cy="256" r="8" fill="url(#ship-bg)"/>

  <!-- Tiny "north" indicator above the top point — subtle visual anchor -->
  <circle cx="256" cy="60" r="9" fill="#FFE54C"/>
</svg>
