<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="STAYLO Ship — Staylo Hotelier Integrated Platform">
  <!-- Same brand tile as the main STAYLO icon so they read as a family -->
  <defs>
    <linearGradient id="ship-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FF6B00"/>
      <stop offset="40%"  stop-color="#FF1F70"/>
      <stop offset="100%" stop-color="#7E22CE"/>
    </linearGradient>
  </defs>

  <!-- Rounded-square brand tile -->
  <rect x="16" y="16" width="480" height="480" rx="108" ry="108" fill="url(#ship-bg)"/>

  <!-- Sail — forward-leaning triangle (tilts right for motion).
       The top apex sits LEFT of the base's left edge, which is what
       gives the sail its "wind-in-it" tilt instead of looking static. -->
  <path d="M 218 92 L 250 348 L 408 348 Z" fill="#FFFFFF"/>

  <!-- Hull — single fluid asymmetric curve, sits with a small gap
       below the sail (the gap reveals the brand gradient = implied
       deck/waterline, no extra strokes needed). -->
  <path d="M 104 372 L 408 372 Q 422 412 350 418 L 178 418 Q 116 414 104 372 Z" fill="#FFFFFF"/>
</svg>
