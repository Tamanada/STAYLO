<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="STAYLO Ship — Staylo Hotelier Integrated Platform">
  <!-- Same brand tile as the main STAYLO icon so they read as a family -->
  <defs>
    <linearGradient id="ship-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FF6B00"/>
      <stop offset="40%"  stop-color="#FF1F70"/>
      <stop offset="100%" stop-color="#7E22CE"/>
    </linearGradient>
  </defs>

  <!-- Rounded-square brand tile -->
  <rect x="16" y="16" width="480" height="480" rx="108" ry="108" fill="url(#ship-bg)"/>

  <!-- Ship's wheel — hoteliers at the helm.
       6 spokes (modern, less busy than 8), 6 handles, hub. -->

  <!-- Outer rim — thick ring -->
  <circle cx="256" cy="256" r="138" fill="none" stroke="#FFFFFF" stroke-width="22"/>

  <!-- 6 spokes radiating from center, evenly spaced at 60° -->
  <g stroke="#FFFFFF" stroke-width="18" stroke-linecap="round">
    <line x1="256" y1="256" x2="256" y2="124"/>                 <!-- 0°   -->
    <line x1="256" y1="256" x2="370.32" y2="190"/>              <!-- 60°  -->
    <line x1="256" y1="256" x2="370.32" y2="322"/>              <!-- 120° -->
    <line x1="256" y1="256" x2="256" y2="388"/>                 <!-- 180° -->
    <line x1="256" y1="256" x2="141.68" y2="322"/>              <!-- 240° -->
    <line x1="256" y1="256" x2="141.68" y2="190"/>              <!-- 300° -->
  </g>

  <!-- 6 handles — knobs extending past the rim at each spoke -->
  <g fill="#FFFFFF">
    <!-- 0° handle (top) -->
    <rect x="240" y="68" width="32" height="62" rx="16"/>
    <!-- 60° handle -->
    <g transform="rotate(60 256 256)"><rect x="240" y="68" width="32" height="62" rx="16"/></g>
    <!-- 120° handle -->
    <g transform="rotate(120 256 256)"><rect x="240" y="68" width="32" height="62" rx="16"/></g>
    <!-- 180° handle (bottom) -->
    <g transform="rotate(180 256 256)"><rect x="240" y="68" width="32" height="62" rx="16"/></g>
    <!-- 240° handle -->
    <g transform="rotate(240 256 256)"><rect x="240" y="68" width="32" height="62" rx="16"/></g>
    <!-- 300° handle -->
    <g transform="rotate(300 256 256)"><rect x="240" y="68" width="32" height="62" rx="16"/></g>
  </g>

  <!-- Hub at center — solid white circle with brand-color dot for depth -->
  <circle cx="256" cy="256" r="32" fill="#FFFFFF"/>
  <circle cx="256" cy="256" r="10" fill="url(#ship-bg)"/>
</svg>
