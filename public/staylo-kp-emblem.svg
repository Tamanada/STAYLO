<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!--
    STAYLO · KP EMBLEM
    Mission : "From one island to the world."
    A stylised globe in the brand colours, with Koh Phangan
    shining at Thailand's position, sparkling links radiating to
    seven world destinations.

    Standalone .svg — no font dependency for the visual.
    Brand palette : #FF6B00 · #FF1F70 · #7E22CE · #FFD580
  -->

  <defs>
    <!-- Brand gradient background -->
    <radialGradient id="kp-bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%"  stop-color="#FF6B00"/>
      <stop offset="55%" stop-color="#FF1F70"/>
      <stop offset="100%" stop-color="#7E22CE"/>
    </radialGradient>

    <!-- Soft glow behind globe -->
    <radialGradient id="globe-aura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>

    <!-- KP glow (warm yellow → orange → transparent) -->
    <radialGradient id="kp-shine" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="35%" stop-color="#FFD580" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FFD580" stop-opacity="0"/>
    </radialGradient>

    <!-- Sparkle filter (just opacity, no fancy effects for SVG compat) -->
    <linearGradient id="link-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.35"/>
    </linearGradient>
  </defs>

  <!-- ============================================================
       BACKGROUND — full brand gradient
       ============================================================ -->
  <rect width="400" height="400" rx="32" fill="url(#kp-bg)"/>

  <!-- Soft aura behind globe -->
  <circle cx="200" cy="200" r="170" fill="url(#globe-aura)"/>

  <!-- ============================================================
       GLOBE — meridians + parallels (small white lines)
       Centered at (200,200) · radius 140
       ============================================================ -->
  <g stroke="white" stroke-width="1.8" fill="none" opacity="0.85">
    <!-- Outer sphere -->
    <circle cx="200" cy="200" r="140"/>
  </g>

  <g stroke="white" stroke-width="1.4" fill="none" opacity="0.7">
    <!-- Equator (horizontal) -->
    <line x1="60" y1="200" x2="340" y2="200"/>
    <!-- Central meridian (vertical) -->
    <line x1="200" y1="60" x2="200" y2="340"/>
  </g>

  <g stroke="white" stroke-width="1.2" fill="none" opacity="0.55">
    <!-- Other meridians (vertical ellipses with shrinking rx) -->
    <ellipse cx="200" cy="200" rx="58"  ry="140"/>
    <ellipse cx="200" cy="200" rx="103" ry="140"/>
    <!-- Parallels (horizontal ellipses with shrinking ry) -->
    <ellipse cx="200" cy="200" rx="140" ry="58"/>
    <ellipse cx="200" cy="200" rx="140" ry="103"/>
  </g>

  <!-- Tropic lines, subtle -->
  <g stroke="white" stroke-width="0.8" fill="none" opacity="0.32">
    <ellipse cx="200" cy="200" rx="140" ry="28"/>
    <ellipse cx="200" cy="200" rx="140" ry="85"/>
    <ellipse cx="200" cy="200" rx="28"  ry="140"/>
    <ellipse cx="200" cy="200" rx="85"  ry="140"/>
  </g>

  <!-- ============================================================
       SPARKLING LINKS — KP to 7 world destinations
       All originate at KP (243, 178) and curve outward
       ============================================================ -->
  <g stroke="url(#link-grad)" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-dasharray="3 5">
    <!-- KP → Europe (upper-left) -->
    <path d="M 243 178 Q 165 130, 105 110"/>
    <!-- KP → North America (left) -->
    <path d="M 243 178 Q 145 175, 70 165"/>
    <!-- KP → South America (lower-left) -->
    <path d="M 243 178 Q 140 240, 95 285"/>
    <!-- KP → Africa (lower-left-center) -->
    <path d="M 243 178 Q 195 235, 160 290"/>
    <!-- KP → Australia (lower-right) -->
    <path d="M 243 178 Q 270 245, 290 305"/>
    <!-- KP → East Asia (right-up) -->
    <path d="M 243 178 Q 285 145, 320 130"/>
    <!-- KP → Pacific Islands (right) -->
    <path d="M 243 178 Q 308 195, 335 215"/>
  </g>

  <!-- ============================================================
       ENDPOINT SPARKLES — 4-point stars at each destination
       ============================================================ -->
  <g fill="white">
    <!-- Star helper: small 4-point diamond -->
    <g transform="translate(105 110)">
      <path d="M 0 -5 L 1 -1 L 5 0 L 1 1 L 0 5 L -1 1 L -5 0 L -1 -1 Z"/>
      <circle cx="0" cy="0" r="1.5"/>
    </g>
    <g transform="translate(70 165)">
      <path d="M 0 -4 L 0.8 -0.8 L 4 0 L 0.8 0.8 L 0 4 L -0.8 0.8 L -4 0 L -0.8 -0.8 Z"/>
    </g>
    <g transform="translate(95 285)">
      <path d="M 0 -5 L 1 -1 L 5 0 L 1 1 L 0 5 L -1 1 L -5 0 L -1 -1 Z"/>
      <circle cx="0" cy="0" r="1.5"/>
    </g>
    <g transform="translate(160 290)">
      <path d="M 0 -4 L 0.8 -0.8 L 4 0 L 0.8 0.8 L 0 4 L -0.8 0.8 L -4 0 L -0.8 -0.8 Z"/>
    </g>
    <g transform="translate(290 305)">
      <path d="M 0 -5 L 1 -1 L 5 0 L 1 1 L 0 5 L -1 1 L -5 0 L -1 -1 Z"/>
      <circle cx="0" cy="0" r="1.5"/>
    </g>
    <g transform="translate(320 130)">
      <path d="M 0 -4 L 0.8 -0.8 L 4 0 L 0.8 0.8 L 0 4 L -0.8 0.8 L -4 0 L -0.8 -0.8 Z"/>
    </g>
    <g transform="translate(335 215)">
      <path d="M 0 -4 L 0.8 -0.8 L 4 0 L 0.8 0.8 L 0 4 L -0.8 0.8 L -4 0 L -0.8 -0.8 Z"/>
    </g>
  </g>

  <!-- ============================================================
       KOH PHANGAN — shining at Thailand's position on the globe
       Position : (243, 178) - upper-right of center
       ============================================================ -->
  <g transform="translate(243 178)">
    <!-- Big halo / shine glow -->
    <circle cx="0" cy="0" r="32" fill="url(#kp-shine)"/>

    <!-- Inner bright halo -->
    <circle cx="0" cy="0" r="15" fill="#FFD580" opacity="0.55"/>

    <!-- Koh Phangan island silhouette (small, recognizable shape) -->
    <g transform="scale(0.08)">
      <path d="
        M -10 -105
        C  20 -112, 55 -110, 85 -100
        C 110 -90, 128 -68, 132 -38
        C 134  -8, 130  22, 122  50
        C 110  78,  88  98,  60 112
        C  35 122,  10 124, -15 122
        C -38 119, -58 112, -78 100
        C -95  86, -105 68, -110 48
        C -113 32, -113 18, -110  4
        L -120  -2
        L -132 -10
        L -136 -22
        L -130 -34
        L -118 -38
        L -108 -28
        C -103 -48, -94 -64, -78 -78
        C -58 -94, -34 -103, -10 -105
        Z"
        fill="#FFFFFF"
        stroke="#FFD580"
        stroke-width="3"/>
    </g>

    <!-- Bright center sparkle -->
    <g>
      <path d="M 0 -10 L 1.5 -1.5 L 10 0 L 1.5 1.5 L 0 10 L -1.5 1.5 L -10 0 L -1.5 -1.5 Z" fill="white"/>
      <circle cx="0" cy="0" r="2.5" fill="#FFD580"/>
    </g>
  </g>

  <!-- ============================================================
       TAGLINE BAND — "From one island to the world"
       ============================================================ -->
  <g>
    <!-- Translucent dark band for legibility -->
    <rect x="40" y="358" width="320" height="28" rx="14" fill="rgba(26,26,46,0.55)"/>
    <text x="200" y="375"
          font-family="Inter, sans-serif"
          font-size="13"
          font-weight="900"
          fill="#FFFFFF"
          text-anchor="middle"
          letter-spacing="3"
          dominant-baseline="middle">FROM ONE ISLAND TO THE WORLD</text>
  </g>

  <!-- Optional micro-label — KP location callout -->
  <g transform="translate(243 220)">
    <text font-family="Inter, sans-serif"
          font-size="9"
          font-weight="800"
          fill="#FFFFFF"
          text-anchor="middle"
          letter-spacing="1.8"
          opacity="0.95">KOH PHANGAN</text>
  </g>
</svg>
